<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pikelet — play together</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="bg-grid" aria-hidden="true"></div>
    <header class="top">
      <div class="logo" aria-hidden="true">
        <span class="logo-pixel"></span>
        <span class="logo-pixel"></span>
        <span class="logo-pixel"></span>
        <span class="logo-pixel"></span>
      </div>
      <div>
        <h1 class="brand">Pikelet</h1>
        <p class="pronounce">Sounds like <strong>pixel-et</strong> — tiny squares, big fun.</p>
      </div>
    </header>

    <main class="panel">
      <p class="lede">
        A simple classroom game hub. Host a room, share a code, everyone plays in the browser.
      </p>

      <div class="actions">
        <a class="btn btn-primary" href="host.html">Host a game</a>
        <a class="btn btn-ghost" href="join.html">Join with code</a>
      </div>

      <section class="modes" aria-label="Coming soon">
        <h2>Modes (coming soon)</h2>
        <ul>
          <li>Live quiz race</li>
          <li>Gold rush (answer fast)</li>
          <li>Team tower</li>
        </ul>
      </section>
    </main>

    <footer class="foot">
      <span>Pikelet is a demo — no accounts yet.</span>
    </footer>
  </body>
</html>
