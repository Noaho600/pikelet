<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Join — Pikelet</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="bg-grid" aria-hidden="true"></div>
    <main class="panel" style="margin-top: 0">
      <h1 class="page-title">Join a game</h1>
      <p class="page-hint">Type the 6-character code your teacher shared.</p>

      <form id="joinForm">
        <div class="field">
          <label for="code">Game code</label>
          <input id="code" name="code" maxlength="6" autocomplete="off" placeholder="ABC123" inputmode="text" />
        </div>
        <div class="row" style="margin-top: 1rem">
          <button type="submit" class="btn btn-primary">Enter lobby</button>
        </div>
      </form>

      <p class="status" id="joinStatus" hidden></p>

      <p class="back"><a href="index.html">← Back home</a></p>
    </main>
    <footer class="foot">
      <span>Pikelet demo</span>
    </footer>

    <script src="js/join.js"></script>
  </body>
</html>
