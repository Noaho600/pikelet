<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Host — Pikelet</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="bg-grid" aria-hidden="true"></div>
    <p id="connStatus" class="conn-line" role="status">Connecting…</p>

    <main class="panel panel-wide">
      <h1 class="page-title">Host dashboard</h1>
      <p class="page-hint">
        Run <code class="inline-code">npm start</code> from the project folder, open this page, share the code, then start the quiz when everyone has joined.
      </p>

      <div class="code-block">
        <span class="code-label">Game code</span>
        <div class="code-display" id="gameCode" aria-live="polite">------</div>
        <div class="row">
          <button type="button" class="btn btn-ghost" id="copyCode">Copy code</button>
        </div>
        <p class="status" id="copyStatus" hidden></p>
      </div>

      <section id="lobby">
        <h2 class="section-title">Lobby</h2>
        <ul class="player-list" id="playerList"></ul>
        <div class="row" style="margin-top: 1rem">
          <button type="button" class="btn btn-primary" id="startGame" disabled>Start quiz</button>
        </div>
      </section>

      <section id="gameHost" hidden>
        <h2 class="section-title">Live question</h2>
        <p class="q-host-meta" id="hostQuestionMeta"></p>
        <p class="q-host-text" id="hostQuestionText"></p>
        <ol class="host-choices" id="hostChoices"></ol>
        <p class="muted" id="hostAnswerProgress"></p>
        <div class="row" style="margin-top: 1rem">
          <button type="button" class="btn btn-primary" id="revealBtn">Reveal answer</button>
          <button type="button" class="btn btn-ghost" id="nextBtn">Next question</button>
        </div>
      </section>

      <section id="endedHost" hidden>
        <h2 class="section-title">Final scores</h2>
        <div class="scoreboard" id="finalScoresHost"></div>
        <p class="back" style="margin-top: 1rem"><a href="index.html">← Home</a></p>
      </section>

      <p class="back" id="backHomeLobby"><a href="index.html">← Home</a></p>
    </main>
    <footer class="foot">
      <span>Pikelet · Quiz mode</span>
    </footer>

    <script type="module" src="js/host-app.js"></script>
  </body>
</html>
